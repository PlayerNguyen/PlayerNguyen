name: CI

on:
  push:
    branches: ["master", "main"]
    paths: ["render/**"]
  pull_request:
    branches: ["master", "main"]
    paths: ["render/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: render

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: render/package-lock.json

      - run: npm ci

      - name: Biome check
        run: npm run ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
